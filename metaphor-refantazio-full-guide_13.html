<title>Metaphor: ReFantazio — 100% Walkthrough Guide</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0e13;--bg2:#16141c;--bg3:#1e1b27;--bg4:#252231;--border:#2e2a3d;--border2:#3d3858;--text:#e8e4f0;--text2:#a09ab8;--text3:#6b6482;--gold:#c9a84c;--gold2:#f0c96a;--gold3:#3a2e0a;--purple:#9b8dd4;--purple2:#7b6bbf;--purple3:#1e1830;--red:#c45c5c;--green:#5cad7c;--blue:#5c9bc4;--orange:#c4865c;--cyan:#5cc4c4;--pink:#c45c9b}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:14px 12px 60px}
.header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--bg2);border:.5px solid var(--border);border-radius:12px;margin-bottom:10px}
.hl{display:flex;align-items:center;gap:10px}.crown{font-size:22px;color:var(--gold)}
.header h1{font-size:15px;font-weight:600}.header-sub{font-size:10px;color:var(--text3);margin-top:1px}
.bsm{padding:5px 12px;border-radius:7px;font-size:11px;cursor:pointer;border:.5px solid #4a1010;background:var(--bg3);color:var(--red)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.sc{background:var(--bg2);border:.5px solid var(--border);border-radius:10px;padding:11px 13px;cursor:pointer;transition:border-color .15s}
.sc:hover{border-color:var(--border2)}
.sl{font-size:9px;color:var(--text3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.sv{font-size:20px;font-weight:700;line-height:1}.ss{font-size:9px;color:var(--text3);margin-top:2px}
.sc.beetles .sv{color:var(--gold2)}.sc.days .sv{color:var(--purple)}.sc.trophies .sv{color:var(--cyan)}.sc.tasks .sv{color:var(--green)}
.nav{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.nb{padding:6px 14px;background:var(--bg2);border:.5px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.nb:hover{border-color:var(--border2);color:var(--text)}.nb.active{background:var(--purple3);border-color:var(--purple2);color:var(--purple)}
.dnav{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border:.5px solid var(--border);border-radius:12px;margin-bottom:10px}
.arr{width:32px;height:32px;border-radius:7px;background:var(--bg3);border:.5px solid var(--border);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.arr:hover:not([disabled]){background:var(--bg4);border-color:var(--border2)}.arr[disabled]{opacity:.3;cursor:not-allowed}
.dc{flex:1;min-width:0}
.ddbtn{font-size:19px;font-weight:700;color:var(--gold2);line-height:1;cursor:pointer;border-bottom:1px dashed var(--gold3);padding-bottom:1px;display:inline-block}
.ddbtn:hover{border-color:var(--gold)}.dsub{font-size:10px;color:var(--text3);margin-top:3px}
.pbar{flex:1;max-width:180px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--purple2),var(--gold));border-radius:2px;transition:width .4s}
.dbtn{padding:6px 14px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:.5px solid;white-space:nowrap;transition:all .15s}
.dbtn.done{background:#0f2a1a;border-color:var(--green);color:var(--green)}.dbtn.undone{background:var(--bg3);border-color:var(--border);color:var(--text2)}
.cov{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.cov.open{display:flex}
.cmod{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:18px 20px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto}
.chd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chd h2{font-size:14px;font-weight:600;color:var(--gold2)}
.cx{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:.5px solid var(--border);color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cleg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:8px;font-size:10px;color:var(--text2)}
.cli{display:flex;align-items:center;gap:4px}.cld{width:9px;height:9px;border-radius:2px;border:1px solid}
.cmonths{display:flex;flex-direction:column;gap:16px}
.cmhd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);margin-bottom:6px;padding-bottom:5px;border-bottom:.5px solid var(--border)}
.cgrid{display:flex;flex-wrap:wrap;gap:4px}
.cday{width:38px;height:34px;text-align:center;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;border:.5px solid transparent;transition:all .12s;line-height:34px;color:var(--text3)}
.cday:hover{background:var(--bg3);border-color:var(--border);color:var(--text)}
.cday.hb{border-color:var(--gold)!important;color:var(--gold2)}.cday.hm{border-color:var(--orange)!important;color:var(--orange)}.cday.hd{border-color:#702020!important;color:var(--red)}.cday.cdone{background:#0a1e10;border-color:#1a3a20!important;color:#3a7a50}.cday.ccur{outline:2px solid var(--purple2);outline-offset:1px;font-weight:700}.cday.cs{opacity:.35}
.content{background:var(--bg2);border:.5px solid var(--border);border-radius:12px;padding:18px 20px}
.pb{margin-bottom:15px}
.pl{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:5px;margin-bottom:8px}
.pl.afternoon{background:#2a1a08;color:#e09040;border:.5px solid #7a4010}.pl.night{background:#0a0a2a;color:#8090e0;border:.5px solid #303070}.pl.story{background:#1a0a2a;color:#a070d0;border:.5px solid #503080}.pl.travel{background:#0a1a2a;color:#5090c0;border:.5px solid #204060}
.ti{display:flex;gap:9px;padding:8px 10px;border-radius:7px;margin-bottom:3px;cursor:pointer;transition:background .1s;align-items:flex-start}
.ti:hover{background:var(--bg3)}.ti.done{opacity:.42}
.ti.done .tt{text-decoration:line-through;color:var(--text3)}
.tc{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ti.done .tc{background:var(--green);border-color:var(--green)}
.chk{color:#fff;font-size:10px;font-weight:700;display:none}.ti.done .chk{display:block}
.tt{font-size:13px;color:var(--text);line-height:1.45}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;white-space:nowrap;letter-spacing:.04em}
.tb{background:#3a2e0a;color:var(--gold2);border:.5px solid #7a5a10}
.ttr{background:#0a2535;color:var(--cyan)}.tq{background:#0a2515;color:var(--green)}.tf{background:#250a35;color:var(--pink)}
.td{background:#350808;color:#e07070;border:.5px solid #702020}
.tm{background:#350f08;color:var(--orange);border:.5px solid #802010;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{border-color:#802010}50%{border-color:#e05010}}
.dbanner{background:#150808;border:1px solid #6a1818;border-radius:10px;padding:13px 16px;margin-bottom:10px}
.dbhd{display:flex;align-items:center;gap:7px;margin-bottom:7px}.dbhd h3{font-size:13px;font-weight:600;color:#f07070}
.tip{font-size:12px;color:var(--text2);padding:7px 10px;background:var(--bg3);border-radius:7px;border-left:2px solid var(--gold);margin-bottom:9px;line-height:1.45}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:6px}
.ec{background:var(--bg3);border:.5px solid var(--border);border-radius:7px;padding:9px 11px}
.en{font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px}
.wr{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px}
.wl{font-size:8px;color:var(--text3);width:100%;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1px}
.eb{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.vgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.vc{background:var(--bg3);border:.5px solid var(--border);border-radius:9px;padding:11px;text-align:center}
.vn{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.vr{font-size:19px;font-weight:700;margin-bottom:2px}.vp{font-size:9px;color:var(--text3);margin-bottom:6px}
.vpips{display:flex;justify-content:center;gap:2px;flex-wrap:wrap;margin-bottom:7px}
.pip{width:7px;height:7px;border-radius:50%;border:1px solid}
.vbtns{display:flex;gap:3px;justify-content:center}
.vbtn{padding:3px 6px;border-radius:4px;background:var(--bg4);border:.5px solid var(--border);color:var(--text2);font-size:10px;cursor:pointer;transition:all .12s}
.vbtn:hover{border-color:var(--border2);color:var(--text)}
.vc.wisdom .vn,.vc.wisdom .vr{color:#70a0e0}.vc.wisdom .pip{border-color:#2a4070}.vc.wisdom .pip.on{background:#70a0e0;border-color:#70a0e0}
.vc.courage .vn,.vc.courage .vr{color:#e07050}.vc.courage .pip{border-color:#602818}.vc.courage .pip.on{background:#e07050;border-color:#e07050}
.vc.tolerance .vn,.vc.tolerance .vr{color:#60b870}.vc.tolerance .pip{border-color:#184828}.vc.tolerance .pip.on{background:#60b870;border-color:#60b870}
.vc.imagination .vn,.vc.imagination .vr{color:#b878e0}.vc.imagination .pip{border-color:#482868}.vc.imagination .pip.on{background:#b878e0;border-color:#b878e0}
.vc.eloquence .vn,.vc.eloquence .vr{color:#e0be50}.vc.eloquence .pip{border-color:#685010}.vc.eloquence .pip.on{background:#e0be50;border-color:#e0be50}
.bgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin-bottom:14px}
.bs{aspect-ratio:1;border-radius:6px;background:var(--bg3);border:.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.bs:hover{border-color:var(--gold)}.bs.got{background:#2a2008;border-color:var(--gold)}
.bsn{font-size:9px;color:var(--text3)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px}
.fc{background:var(--bg3);border:.5px solid var(--border);border-radius:8px;padding:10px 12px}
.fn{font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px}
.frr{display:flex;align-items:center;justify-content:space-between}
.frl{font-size:9px;color:var(--text3)}.frv{font-size:14px;font-weight:700;color:var(--pink)}
.rpips{display:flex;gap:2px;margin-top:4px}.rpip{height:3px;flex:1;background:var(--bg4);border-radius:2px}.rpip.on{background:var(--pink)}
.fbtns{display:flex;gap:4px;margin-top:7px}
.fbtn{flex:1;padding:3px 0;background:var(--bg4);border:.5px solid var(--border);border-radius:4px;color:var(--text2);font-size:11px;cursor:pointer;text-align:center;transition:all .12s}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.sbar{width:100%;padding:8px 12px;background:var(--bg3);border:.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
.sbar:focus{border-color:var(--purple2)}
.dge{margin-bottom:20px}.dghd{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}
.dgn{font-size:14px;font-weight:600;color:var(--text)}.dgm{font-size:10px;color:var(--red)}.dgs{font-size:10px;color:var(--blue)}.dgu{font-size:10px;color:var(--text3)}
.sep{height:.5px;background:var(--border);margin-top:18px}

</style>
</head>

{d:"06/02",tasks:[
{p:"story",t:"Grand Trad, Recruitment Center \u2013 Once you start your interview, you'll be given 5 choices. Depending on your choice, you'll gain extra skills points for specific skills. Choosing one of the dialogues will give you an increase in the following skills in order of appearance: Strength, Magic, Endurance, Agility, Luck. You can choose whichever one you want."}]},

{p:"afternoon",t:"Earn 🏆 Stunning! on the very first enemy encounter.",trophy:1},
{p:"afternoon",t:"Earn 🏆 Allies United after defeating the boss.",trophy:1},
{p:"night",t:"Once you're at the camp, pick up the Gold Beetle under one of the trees behind where Strohl is. This is highly missable as you cannot come back to this area after this night. (1/50)",beetle:1,missable:1},
{p:"night",t:"Earn 🏆 Shake on It after unlocking your first Follower.",trophy:1}]},
{d:"06/06",tasks:[
{p:"afternoon",t:"Towards the end of the Nord Mines, there will be a dragon you can sneak past. If you're feeling up to it, you can battle the dragon which will reward you with a weapon for the Warrior class. You cannot come back to this dungeon, so this is your only chance to get it if you want it. The dragon is weak to ice, so try to get at least 2 characters with Mage Rank 2 so you can spam ice attacks. Try not to use any of your MP recharging items during this fight if you can, as you'll need them for the first main dungeon, though it isn't the end of the world if you use a couple.",missable:1,dungeon:"Nord Mines"},
{p:"afternoon",t:"Earn 🏆 Out of the Fire after completing the Nord Mines.",trophy:1}]},
{d:"06/07",tasks:[{p:"story",t:"Nothing but story."}]},
{d:"06/08",tasks:[{p:"story",t:"Nothing but story."}]},

{d:"06/10",tasks:[{p:"story",t:"Nothing but story."}]},
{d:"06/11",tasks:[
{p:"afternoon",t:"Grand Trad, Sunshade Row \u2013 Collect the Gold Beetle behind the stairs leading to Comfort Concoctions. (2/50)",beetle:2},
{p:"afternoon",t:"Grand Trad, Comfort Concoctions \u2013 Collect the Gold Beetle by choosing to stick your hand in the sack of spices near the door. (3/50)",beetle:3},
{p:"afternoon",t:"Grand Trad, Sunshade Row \u2013 Talk to More to visit Akademia, then accept the side quest \"More's Task: Foreword and Prologue\".",quest:1},
{p:"afternoon",t:"Progress the story and once you reach the boss fight, use a Synthesis skill to earn 🏆 United Front.",trophy:1}]},
{d:"06/12",tasks:[
{p:"afternoon",t:"Grand Trad, Sunshade Row \u2013 Accept the side quest \"Pagan's Dilemma\" from the Mustari Man. Go to St. Fermis Church to buy the Breath of Fresh Air and turn in the side quest. (+4 Tolerance)",quest:1},
{p:"afternoon",t:"Grand Trad, Sunshade Row \u2013 Give the Man in Pain a Medical Herb."},
{p:"afternoon",t:"Grand Trad, Sunlumeo Street \u2013 Accept the side quest \"Help the Hushed Honeybee\" from the Young Nidia Man.",quest:1},
{p:"afternoon",t:"Grand Trad, Recruitment Center \u2013 Collect the Gold Beetle in the corner of the hallway. (4/50)",beetle:4},
{p:"afternoon",t:"Grand Trad, Regalith Grand Cathedral \u2013 Talk to the Water Merchant and purchase the 3 Fruit Cordial she's selling. This will be very useful for the upcoming dungeon."},
{p:"afternoon",t:"Grand Trad, Catacombs Entrance \u2013 Enter the dungeon. We're aiming to complete the dungeon within a single day, which would be nearly impossible if not for the Mage's Magic Recovery passive that lets you regain 1 MP for your entire party every time an enemy is stunned/defeated on the field as long as its equipped to the Main Character. The dungeon is very long and with a very small MP pool, you'll run out quickly. Thankfully that skill combined with the enemies that infinitely spawn from the Trance Crystals in the second part of the dungeon, you basically have infinite MP. While you're grinding at the Trance Crystals to regain MP, be careful of the Mage's Area of Effect basic attack that will also damage the Trance Crystal. If you find the Trance Crystal getting low HP, enter the Magla Hollow and exit it to reset its HP back to full.",dungeon:"Catacombs"},
{p:"afternoon",t:"While in the dungeon, try to get the Healer Archetype to Rank 10, so you can turn in the quest \"More's Task: Foreword and Prologue\" and accept \"More's Task Chapter One: Ordeal\" to progress his follower rank. (Rank 2) (+4 Imagination)",follower:"More",rank:2,quest:1},
{p:"afternoon",t:"Once you reach the end of the dungeon and defeat the boss, you'll unlock 🏆 Calamity Averted.",trophy:1}]},
{d:"06/13",tasks:[
{p:"afternoon",t:"Grand Trad, Recruitment Center \u2013 Accept the bounty \"Man's Not-So Best Friend\"."},
{p:"afternoon",t:"Spend time with Hulkenberg. (Rank 2)",follower:"Hulkenberg",rank:2},
{p:"night",t:"Grand Trad, Sunshade Row \u2013 Buy information from the Informant. Specifically the Secret of the Redgrass Shop so you can purchase Redgrass."},
{p:"night",t:"Grand Trad, Hushed Honeybee Inn \u2013 Cook with Fabienne. The dialogue you get is random, so make sure to save beforehand until you choose the correct one. (+3 Tolerance)"}]},
{d:"06/14",tasks:[
{p:"afternoon",t:"Grand Trad, Sunlumeo Street \u2013 Turn in the side quest \"Help the Hushed Honeybee\". (+4 Wisdom)",quest:1},
{p:"afternoon",t:"Spend time with Strohl. (Rank 2)",follower:"Strohl",rank:2},
{p:"night",t:"Grand Trad, Sunlumeo Street \u2013 Gaze at the view of the Royal Capital. (+2 Wisdom. Rank 2 Wisdom)"}]},
{d:"06/15",tasks:[
{p:"afternoon",t:"Grand Trad, Regalith Grand Cathedral \u2013 Buy some Pristine Clear Water, Bidou Meat, and Redgrass. This will also unlock 🏆 Shrewd Shopper.",trophy:1},
{p:"afternoon",t:"Grand Trad, St. Fermis Church \u2013 With Rank 2 Wisdom, you can now purify an item to unlock 🏆 Blessed Power.",trophy:1},
{p:"afternoon",t:"Grand Trad, Sunlumeo Street \u2013 Accept the side quest \"A Bullish Embargo\" from the Igniter Merchantess. Requires Rank 2 Wisdom in order to accept.",quest:1},

{p:"night",t:"Grand Trad, Hushed Honeybee Inn \u2013 Make Redgrass-Roasted Bidou with Fabienne. Choose option 2 for maximum points. (+3 Tolerance)"}]},
{d:"06/17",tasks:[

{p:"afternoon",t:"Martira, Blind Well Alley \u2013 Enter the dungeon. This dungeon isn't nearly as long as the first dungeon so MP isn't as big of an issue, but you should still try and use it sparingly since we want to complete the dungeon in one go. A good idea might be to level up the Thief archetype on every character to level 11 so you can unlock Plunder Magic and use skill inheritance to have it on everyone, so you can always steal MP whenever you're low instead of just relying on the Mage's Magic Recovery skill.",dungeon:"Blind Well Alley"},
{p:"afternoon",t:"Throughout the dungeon you'll have to sneak past a specific enemy. You can fight them, but it isn't worth it as you don't get any special rewards for beating them."},
{p:"afternoon",t:"You'll also want to get the Merchant Archetype to rank 15 so you can turn in the side quest \"More's Task Chapter Two: Solitude\" and accept \"More's Task Chapter Three: Drifting\". (Rank 4) (+4 Imagination)",follower:"More",rank:4,quest:1},

/* ─── GUIDE TAB ─────────────────────────────────────────────────────── */
function rGuide(){
  var d=DAYS[S.day],pct=Math.round(S.day/DAYS.length*100),done=S.doneDays.has(S.day);
  var grp={};
  d.tasks.forEach(function(t,i){if(!grp[t.p])grp[t.p]=[];grp[t.p].push({t:t,i:i});});
  var dgs=[];
  d.tasks.forEach(function(t){if(t.dungeon&&dgs.indexOf(t.dungeon)<0)dgs.push(t.dungeon);});
  var h='<div class="dnav">';
  h+='<button class="arr" onclick="goDay(-1)"'+(S.day===0?" disabled":"")+">&#8249;</button>";
  h+='<div class="dc"><div class="ddbtn" onclick="openCal()" title="Click to jump to any date">&#128197; '+d.d+' <span style="font-size:12px;color:var(--text3)">&#9662;</span></div>';
  h+='<div class="dsub">Day '+(S.day+1)+" of "+DAYS.length+" &mdash; click date to jump</div></div>";
  h+='<div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div>';
  h+='<button class="dbtn '+(done?"done":"undone")+'" onclick="toggleDay('+S.day+')">'+(done?"&#10003; Completed":"Mark Done")+"</button>";
  h+='<button class="arr" onclick="goDay(1)"'+(S.day===DAYS.length-1?" disabled":"")+">&#8250;</button></div>";
  if(dgs.length){
    h+='<div class="dbanner"><div class="dbhd"><span style="color:var(--red);font-size:15px">&#9876;</span>&nbsp;<h3>Dungeon Day &mdash; '+dgs.join(" &amp; ")+"</h3></div>";
    dgs.forEach(function(name){
      var dg=DUNGEONS.find(function(x){return x.name===name;});if(!dg)return;
      h+='<div class="tip">&#128161; '+dg.hint+"</div>";
      h+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px">'+name+" &mdash; Enemies &amp; Weaknesses</div>";
      h+='<div class="egrid" style="margin-bottom:8px">'+dg.enemies.map(ec).join("")+"</div>";
    });
    h+="</div>";
  }
  h+='<div class="content">';
  var periods=["afternoon","night","story","travel"];
  var labels={afternoon:"Afternoon",night:"Night",story:"Story",travel:"Travel"};
  periods.forEach(function(p){
    if(!grp[p])return;
    h+='<div class="pb"><span class="pl '+p+'">'+labels[p]+"</span>";
    grp[p].forEach(function(item){
      var t=item.t,i=item.i,k=S.day+"-"+i,ck=!!S.tasks[k];
      var tags="";
      if(t.missable)tags+='<span class="tag tm">&#9888; MISSABLE</span>';
      if(t.beetle)tags+='<span class="tag tb">🪲 Beetle #'+t.beetle+"</span>";
      if(t.trophy)tags+='<span class="tag ttr">&#127942; Trophy</span>';
      if(t.quest)tags+='<span class="tag tq">&#128220; Quest</span>';
      if(t.follower)tags+='<span class="tag tf">&#128100; '+t.follower+" Rank "+t.rank+"</span>";
      if(t.dungeon&&!t.beetle)tags+='<span class="tag td">&#9876; Dungeon</span>';
      h+='<div class="ti '+(ck?"done":"")+"\" onclick=\"toggleTask("+S.day+","+i+')">';
      h+='<div class="tc"><span class="chk">&#10003;</span></div>';
      h+="<div><span class=\"tt\">"+t.t+"</span>"+(tags?'<div class="tags">'+tags+"</div>":"")+"</div></div>";
    });
    h+="</div>";
  });
  return h+"</div>";
}

function ec(e){
  var h='<div class="ec"><div class="en">'+e.n+"</div>";
  if(e.w&&e.w.length)h+='<div class="wr"><div class="wl">Weak</div>'+e.w.map(function(x){return'<span class="eb" style="'+es(x)+'">'+x+"</span>";}).join("")+"</div>";
  if(e.r&&e.r.length)h+='<div class="wr"><div class="wl">Resist</div>'+e.r.map(function(x){return'<span class="eb" style="background:#203040;color:#5090b0;border:.5px solid #305060">'+x+"</span>";}).join("")+"</div>";
  if(e.nl&&e.nl.length)h+='<div class="wr"><div class="wl">Null</div>'+e.nl.map(function(x){return'<span class="eb" style="background:#1a1a1a;color:#888;border:.5px solid #444">'+x+"</span>";}).join("")+"</div>";
  return h+"</div>";
}

/* ─── CALENDAR ──────────────────────────────────────────────────────── */
function openCal(){
  var mnames={"06":"June","07":"July","08":"August","09":"September","10":"October","12":"December"};
  var monthOrder=["06","07","08","09","10","12"];
  var months={};
  DAYS.forEach(function(d,i){
    var mn=d.d.slice(0,2);
    if(!months[mn])months[mn]={label:mnames[mn]||mn,days:{}};
    var dayNum=parseInt(d.d.slice(3));
    months[mn].days[dayNum]={d:d.d,i:i,hb:d.tasks.some(function(t){return t.beetle;}),hm:d.tasks.some(function(t){return t.missable;}),hd:d.tasks.some(function(t){return t.dungeon;}),cs:d.tasks.every(function(t){return t.p==="story";})};
  });
  var h='<div class="chd"><h2>&#128197; Jump to Date</h2><button class="cx" onclick="closeCal()">&#215;</button></div>';
  h+='<div class="cleg"><div class="cli"><div class="cld" style="background:#350f08;border-color:var(--orange)"></div>Missable</div><div class="cli"><div class="cld" style="background:#3a2e0a;border-color:var(--gold)"></div>Beetle</div><div class="cli"><div class="cld" style="background:#350808;border-color:#702020"></div>Dungeon</div><div class="cli"><div class="cld" style="background:#0a1e10;border-color:#1a3a20"></div>Done</div><div class="cli"><div class="cld" style="background:transparent;border-color:var(--purple2)"></div>Current</div></div>';
  h+='<div class="cmonths">';
  monthOrder.forEach(function(mn){
    if(!months[mn])return;
    var m=months[mn];
    var dayNums=Object.keys(m.days).map(Number);
    var maxDay=Math.max.apply(null,dayNums);
    h+='<div><div class="cmhd">'+m.label+"</div>";
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px">';
    ["Mo","Tu","We","Th","Fr","Sa","Su"].forEach(function(dn){h+='<div style="text-align:center;font-size:9px;color:var(--text3);font-weight:600;padding:2px 0">'+dn+"</div>";});
    h+="</div>";
    h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
    for(var day=1;day<=maxDay;day++){
      var info=m.days[day];
      if(!info){h+='<div class="cday" style="cursor:default;opacity:.15">'+day+"</div>";}
      else{
        var isDone=S.doneDays.has(info.i),isCur=info.i===S.day;
        var cls="cday";
        if(isCur)cls+=" ccur";
        else if(isDone)cls+=" cdone";
        else if(info.hm)cls+=" hm";
        else if(info.hb)cls+=" hb";
        else if(info.hd)cls+=" hd";
        else if(info.cs)cls+=" cs";
        h+='<div class="'+cls+'" onclick="jumpToDay('+info.i+')" title="'+info.d+'">'+day+"</div>";
      }
    }
    h+="</div></div>";
  });
  h+="</div>";
  document.getElementById("cmod").innerHTML=h;
  document.getElementById("cov").classList.add("open");
}
function closeCal(){document.getElementById("cov").classList.remove("open");}
function jumpToDay(i){S.day=i;closeCal();render();save();}

/* ─── VIRTUES TAB ───────────────────────────────────────────────────── */
function computeVirtuePoints(virtue){
  var pts=0;
  var re=new RegExp("\\(\\+(\\d+)\\s+"+virtue+"[\\s.,)]","i");
  DAYS.forEach(function(d,di){d.tasks.forEach(function(t,ti){
    if(!S.tasks[di+"-"+ti])return;
    var m=t.t.match(re);
    if(m)pts+=parseInt(m[1]);
  });});
  return pts;
}
function rVirtues(){
  var defs=[{k:"wisdom",col:"#70a0e0"},{k:"courage",col:"#e07050"},{k:"tolerance",col:"#60b870"},{k:"imagination",col:"#b878e0"},{k:"eloquence",col:"#e0be50"}];
  var h='<div class="content"><div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Royal Virtues</div><div class="vgrid">';
  defs.forEach(function(def){
    var v=def.k,col=def.col;
    var computed=computeVirtuePoints(v);
    var pts=Math.max(S.virtues[v]||0,computed);
    var rank=0;
    for(var i=1;i<VTHR.length;i++)if(pts>=VTHR[i])rank=i;
    var prev=VTHR[rank]||0,next=VTHR[rank+1]||99,inR=pts-prev,need=next-prev;
    var count=Math.min(need,10);
    var pips="";
    for(var j=0;j<count;j++)pips+='<div class="pip'+(j<inR?" on":"")+'" style="'+(j<inR?"background:"+col+";border-color:"+col:"border-color:var(--border2)")+'"></div>';
    h+='<div class="vc '+v+'">';
    h+='<div class="vn">'+v+"</div>";
    h+='<div class="vr">Rank '+(rank+1)+"</div>";
    h+='<div class="vp">'+pts+" pts"+(computed>0?" ("+computed+" from tasks)":"")+"</div>";
    h+='<div class="vpips">'+pips+"</div>";
    h+='<div class="vbtns">';
    h+='<button class="vbtn" onclick="chV(\''+v+"',-1)\">\u2212</button>";
    h+='<button class="vbtn" onclick="chV(\''+v+"',1)\">+1</button>";
    h+='<button class="vbtn" onclick="chV(\''+v+"',4)\">+4</button>";
    h+='<button class="vbtn" onclick="chV(\''+v+"',8)\">+8</button>";
    h+="</div></div>";
  });
  return h+'</div><div style="font-size:10px;color:var(--text3);margin-top:8px">Rank thresholds: 0 \u2192 5 \u2192 11 \u2192 18 \u2192 26 \u2192 35 pts. Virtue points auto-counted from completed tasks.</div></div>';
}

function trophyEarnedFromTasks(trophy){
  if(!trophy.snip)return false;
  var snip=trophy.snip;
  var found=false;
  DAYS.forEach(function(d,di){d.tasks.forEach(function(t,ti){
    if(found||!t.trophy||!S.tasks[di+"-"+ti])return;
    if(t.t.indexOf(snip)>=0)found=true;
  });});
  return found;
}

function countEarnedTrophies(){
  var n=0;
  ALL_TROPHIES.forEach(function(t){if(trophyEarnedFromTasks(t)||S.trophies.has(t.key))n++;});
  return n;
}

function toggleDay(i){
  if(S.doneDays.has(i)){
    S.doneDays.delete(i);
    DAYS[i].tasks.forEach(function(t,ti){
      var k=i+"-"+ti;
      if(S.tasks[k]){delete S.tasks[k];if(t.beetle)S.beetles.delete(t.beetle);}
    });
  } else {
    S.doneDays.add(i);
    DAYS[i].tasks.forEach(function(t,ti){
      var k=i+"-"+ti;
      if(!S.tasks[k]){S.tasks[k]=true;if(t.beetle)S.beetles.add(t.beetle);}
    });
  }
  render();save();
}

function toggleTask(day,task){
  var k=day+"-"+task,t=DAYS[day].tasks[task];
  if(S.tasks[k]){delete S.tasks[k];if(t.beetle)S.beetles.delete(t.beetle);}
  else{S.tasks[k]=true;if(t.beetle)S.beetles.add(t.beetle);}
  var allDone=DAYS[day].tasks.every(function(_,ti){return S.tasks[day+"-"+ti];});
  if(allDone)S.doneDays.add(day);else S.doneDays.delete(day);
  render();save();
}

function toggleBeetle(n){if(S.beetles.has(n))S.beetles.delete(n);else S.beetles.add(n);render();save();}
function chV(v,d){S.virtues[v]=Math.max(0,(S.virtues[v]||0)+parseInt(d));render();save();}
function chF(name,d){var f=FOLLOWERS.find(function(x){return x.name===name;});S.followers[name]=Math.max(0,Math.min(f.max,(S.followers[name]||0)+parseInt(d)));render();save();}
function toggleTrophy(key){if(S.trophies.has(key))S.trophies.delete(key);else S.trophies.add(key);render();save();}
function goDay(d){var n=S.day+d;if(n>=0&&n<DAYS.length){S.day=n;render();save();}}
function resetAll(){if(confirm("Reset ALL progress? This cannot be undone.")){localStorage.removeItem("mrf_v5");S={day:0,doneDays:new Set(),tasks:{},beetles:new Set(),virtues:{wisdom:0,courage:0,tolerance:0,imagination:0,eloquence:0},followers:{},trophies:new Set(),tab:"guide"};openTab("guide");}}

load();openTab(S.tab||"guide");updateStats();
